# Registry-first single-instance deployment for Capillary.
#
# Default (pull the published image from GHCR):
#   CAPILLARY_IMAGE=ghcr.io/solesius/capillary-cr:latest docker compose up -d
# or set CAPILLARY_IMAGE in a .env file (see .env.example) and run:
#   docker compose up -d
#
# Build locally instead of pulling (developers / air-gapped hosts):
#   make docker-up
#   docker compose build && docker compose up -d
#
# Durable storage and review captures live in docker-managed named volumes —
# no host directory setup, no ownership pitfalls, and the data (which includes
# real code diffs) is not left in a world-browsable folder next to the repo.
# Migrating from an older checkout that used ./data? Copy it once:
#   docker run --rm -v "$(pwd)/data:/from" -v capillary_capillary-data:/to \
#     alpine cp -a /from/. /to/
#
# `pull_policy: missing` means an already-present image is used as-is and is only
# pulled when absent; an explicit `docker compose build` (or `make docker-build`)
# overrides it with a locally built image tagged the same as CAPILLARY_IMAGE.
services:
  capillary:
    image: "${CAPILLARY_IMAGE:-ghcr.io/solesius/capillary-cr:latest}"
    pull_policy: missing
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${CAPILLARY_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:8080}"
      CAPILLARY_SERVE_WEB: "1"
      CAPILLARY_WEB_DIST: "/app/web-dist"
      CAPILLARY_STORAGE_DIR: "/var/lib/capillary"
      CAPILLARY_REQUIRE_GITHUB_LOGIN: "${CAPILLARY_REQUIRE_GITHUB_LOGIN:-1}"
      GITHUB_OAUTH_CLIENT_ID: "${GITHUB_OAUTH_CLIENT_ID:-}"
      GITHUB_OAUTH_CLIENT_SECRET: "${GITHUB_OAUTH_CLIENT_SECRET:-}"
      GITHUB_OAUTH_REDIRECT_URI: "${GITHUB_OAUTH_REDIRECT_URI:-}"
      GITHUB_OAUTH_SCOPES: "${GITHUB_OAUTH_SCOPES:-repo workflow read:org read:user}"
      # LLM planner credentials are read from the server environment only; pass
      # whichever provider key(s) you use. See .env.example / ARCHITECTURE.md.
      CAPILLARY_LLM_API_KEY: "${CAPILLARY_LLM_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GITHUB_COPILOT_TOKEN: "${GITHUB_COPILOT_TOKEN:-}"
      # Reach a codex app-server on the host via the ws bridge, e.g.
      # ws://host.docker.internal:7899 — see api/scripts/codex_ws_bridge.ts.
      CODEX_APP_SERVER_URL: "${CODEX_APP_SERVER_URL:-}"
      # Same pattern for the claude CLI — see api/scripts/claude_ws_bridge.ts.
      CLAUDE_CODE_URL: "${CLAUDE_CODE_URL:-}"
      # RetV browser agent: the image bundles chromium with headless launch
      # flags baked in — functional tests work out of the box. Point
      # CDP_BASE_URL at an external endpoint to use a different browser, or
      # override CDP_LAUNCH_FLAGS for custom launch behavior.
      CDP_BASE_URL: "${CDP_BASE_URL:-}"
      CHROME_PATH: "${CHROME_PATH:-/headless-shell/headless-shell}"
      CDP_LAUNCH_FLAGS: "${CDP_LAUNCH_FLAGS:---no-sandbox --disable-gpu --disable-dev-shm-usage --disable-crashpad}"
    extra_hosts:
      # Makes host.docker.internal resolve on Linux too (Docker Desktop has it
      # built in); used for the codex ws bridge and host CDP endpoints.
      - "host.docker.internal:host-gateway"
    volumes:
      - capillary-data:/var/lib/capillary
      - capillary-captures:/app/api/.data/review_captures
    healthcheck:
      test: ["CMD", "deno", "eval", "const r = await fetch(`http://127.0.0.1:$${Deno.env.get('PORT') || 8080}/healthz`); if (!r.ok) Deno.exit(1);"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped

volumes:
  capillary-data:
  capillary-captures:
